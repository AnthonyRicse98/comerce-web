name: Despliegue Automático al hacer Push

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      # ─── AQUÍ CONFIGURAMOS GIT ANTES DE LANZAR EL DEPLOY ───
      - name: Ejecutar Despliegue Oficial
        run: |
          # 1. Le decimos a Git quién firma el commit del build
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Re-escribimos la URL remota inyectándole el token para que no pida contraseña
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # 3. Lanzamos tu comando de siempre
          npm run deploy