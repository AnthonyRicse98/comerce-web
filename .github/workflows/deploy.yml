name: Despliegue Automático

on:
  push:
    branches:
      - main # Debe escuchar a main para atrapar tus commits y los del CMS

permissions:
  contents: write # Permiso crucial para que el bot pueda crear la rama gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      # Solo compilamos el código, NO ejecutamos 'npm run deploy'
      - name: Compilar el proyecto (Vite)
        run: npm run build 

      # Esta herramienta oficial toma la carpeta dist y la manda a gh-pages por ti
      - name: Desplegar hacia la rama gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Asegúrate de que Vite esté generando esta carpeta (y no 'build')
          branch: gh-pages